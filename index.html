<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Getir - Dakikalar İçinde Kapınızda</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <nav>
      <div class="container">
        <ul class="nav-left">
          <li class="active">getir</li>
          <li>getiryemek</li>
          <li>getirbüyük</li>
          <li>getirsu</li>
          <li>getirçarşı</li>
        </ul>

        <div class="nav-right">
          <span><i class="ri-global-line"></i> Türkçe (TR)</span>
          <span><i class="ri-user-fill"></i> Giriş yap</span>
          <span><i class="ri-user-add-fill"></i> Kayıt Ol</span>
        </div>
      </div>
    </nav>

    <section class="hero">
  <div class="container">
    
    <div class="hero-left">
      <img src="getir-logo.png" alt="Getir Logo">
      <h2>Dakikalar içinde kapında</h2>
    </div>

    <div class="hero-right">
      <div class="login-card">
        <h5>Giriş yap veya kayıt ol</h5>
        
        <div class="input-container">
          <div class="country-code">
            <span>+90</span>
          </div>
          <input type="tel" placeholder="Telefon Numarası">
        </div>

        <button class="continue-btn">
          Telefon numarası ile devam et
        </button>
      </div>
    </div>

  </div>
</section>

  <section class="categories">
    <div class="container">
      <h3>Kategoriler</h3>

      <div class="category-list">
        <a href="#" class="category-item">
          <div class="image-wrapper">
            <img src="atistirmalik.png" alt="Atistirmalik">
          </div>
          <span>Atıştırmalık</span>
        </a>

        <a href="#" class="category-item">
        <div class="image-wrapper">
          <img src="icecek.png" alt="Su & İçecek">
        </div>
        <span>Su & İçecek</span>
      </a>

      <a href="#" class="category-item">
        <div class="image-wrapper">
          <img src="meyve.png" alt="Meyve & Sebze">
        </div>
        <span>Meyve & Sebze</span>
      </a>

      </div>
    </div>
  </section>

  </body>
</html>
